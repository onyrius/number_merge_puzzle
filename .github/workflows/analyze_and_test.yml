name: Flutter Analyze & Test

on:
  pull_request:
    branches: [ main, master, development ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código do repositório para dentro da máquina virtual
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. Configura o ambiente Java (necessário para ferramentas do ecossistema Android/Flutter)
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Configura o Flutter na máquina virtual (usa a versão estável mais recente)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Ativa o cache para baixar os pacotes mais rápido nas próximas vezes

      # 4. Baixa todas as dependências do projeto (pub get)
      - name: Install dependencies
        run: flutter pub get

      # 5. EXECUÇÃO DO CÓDIGO LIMPO: Verifica regras do Linter e formatação
      - name: Run Flutter Analyzer
        run: flutter analyze

      - name: Check Formatting
        run: dart format --set-exit-if-changed lib test

      # 6. EXECUÇÃO DOS TESTES: Roda toda a nossa suíte de testes com cobertura
      - name: Run Unit & Widget Tests
        run: flutter test --coverage

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "coverage/lcov.info not found";
            exit 1;
          fi
          read covered total <<< $(awk -F, '/^DA:/ {total++; if($2>0) covered++} END {print covered" "total}' coverage/lcov.info)
          if [ -z "$total" ] || [ "$total" -eq 0 ]; then
            echo "No instrumented lines found in coverage report";
            exit 1;
          fi
          percent=$((100*covered/total))
          echo "Code coverage: $percent% ($covered/$total)"
          if [ "$percent" -lt 75 ]; then
            echo "Coverage $percent% is below threshold (75%)";
            exit 1;
          fi

      # Upload coverage report as an artifact so it can be downloaded from the workflow run
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-lcov
          path: coverage/lcov.info

      # Optional: publish coverage to Codecov (will work for public repos or when CODECOV_TOKEN is set)
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: false

      # 7. (Opcional) Mostra o resumo da cobertura direto no log da pipeline
      - name: Report Code Coverage
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            coverage:
              - 'coverage/lcov.info'